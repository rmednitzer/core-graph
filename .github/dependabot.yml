version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - python
    assignees:
      - rmednitzer
    commit-message:
      prefix: chore
      include: scope
    groups:
      python-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      python-security:
        applies-to: security-updates
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    assignees:
      - rmednitzer
    commit-message:
      prefix: chore
      include: scope
    groups:
      actions-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /deploy/docker
    schedule:
      interval: monthly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    assignees:
      - rmednitzer
    commit-message:
      prefix: chore
      include: scope
    groups:
      docker-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
