name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 0"

jobs:
  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          artifact-name: sbom.cyclonedx.json

  cve-scan:
    runs-on: ubuntu-latest
    needs: sbom
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8.0.1
        with:
          name: sbom.cyclonedx.json
      - uses: anchore/scan-action@v7
        with:
          sbom: sbom.cyclonedx.json
          fail-build: true
          severity-cutoff: high

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  docker-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Build application Docker image
        run: docker build -t core-graph-app:ci -f deploy/docker/Dockerfile.app .
      - name: Scan application image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: core-graph-app:ci
          format: table
          exit-code: "1"
          severity: CRITICAL
      - name: Generate container image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: core-graph-app:ci
          format: cyclonedx-json
          artifact-name: sbom-container.cyclonedx.json
      - name: Check for additional Dockerfiles
        id: check-pg
        run: |
          if [ -f deploy/docker/Dockerfile.postgres ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build PostgreSQL image
        if: steps.check-pg.outputs.found == 'true'
        run: docker build -t core-graph-pg:ci -f deploy/docker/Dockerfile.postgres .
      - name: Scan PostgreSQL image with Trivy
        if: steps.check-pg.outputs.found == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: core-graph-pg:ci
          format: table
          exit-code: "1"
          severity: CRITICAL
