# ArgoCD Application — core-graph (production environment)
# Deploy with: kubectl apply -f deploy/k8s/helm/argocd/application-prod.yaml
# Requires: ArgoCD installed + repo credentials configured
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-graph-prod
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: core-graph
    assurance.platform/tier: "T1"
    assurance.platform/profile: prod
  annotations:
    argocd.argoproj.io/manifest-generate-paths: deploy/k8s/helm
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: deployments
    notifications.argoproj.io/subscribe.on-sync-failed.slack: deployments
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/rmednitzer/core-graph.git
    targetRevision: main
    path: deploy/k8s/helm
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
      parameters: []
  destination:
    server: https://kubernetes.default.svc
    namespace: core-graph
  syncPolicy:
    # Manual sync for production — requires explicit approval
    syncOptions:
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
  revisionHistoryLimit: 10
