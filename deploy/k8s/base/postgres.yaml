apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: core-graph
data:
  POSTGRES_DB: core_graph
  POSTGRES_USER: cg_admin
  postgresql-extra.conf: |
    shared_preload_libraries = 'age,pgaudit,pg_cron'
    cron.database_name = 'core_graph'
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: core-graph
type: Opaque
stringData:
  POSTGRES_PASSWORD: changeme
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: core-graph
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: core-graph
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          args:
            - "-c"
            - "shared_preload_libraries=age,pgaudit,pg_cron"
            - "-c"
            - "cron.database_name=core_graph"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - "-U"
                - cg_admin
                - "-d"
                - core_graph
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - "-U"
                - cg_admin
                - "-d"
                - core_graph
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: core-graph
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
