# Local development stack for core-graph.
# Usage: docker compose -f deploy/docker/docker-compose.yml up -d

services:
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.app
    container_name: cg-api
    ports:
      - "8000:8000"
    environment:
      CG_PG_DSN: postgresql://cg_admin:cg_dev_only@postgres:5432/core_graph
      CG_NATS_URL: nats://nats:4222
      CG_VALKEY_URL: redis://valkey:6379
      CG_OIDC_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - core-graph

  postgres:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.postgres
    container_name: cg-postgres
    environment:
      POSTGRES_USER: cg_admin
      POSTGRES_PASSWORD: cg_dev_only
      POSTGRES_DB: core_graph
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_preload_libraries='age,pgaudit,pg_cron'
      -c cron.database_name=core_graph
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cg_admin -d core_graph"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - core-graph

  nats:
    image: nats:latest
    container_name: cg-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ../nats/nats-server.conf:/etc/nats/nats-server.conf:ro
      - natsdata:/data
    command: ["--config", "/etc/nats/nats-server.conf"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - core-graph

  valkey:
    image: valkey/valkey:latest
    container_name: cg-valkey
    ports:
      - "6379:6379"
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - core-graph

  spicedb:
    image: authzed/spicedb:latest
    container_name: cg-spicedb
    command: serve --grpc-preshared-key=cg_dev_only --datastore-engine=memory
    ports:
      - "50051:50051"
    networks:
      - core-graph

  cerbos:
    image: ghcr.io/cerbos/cerbos:latest
    container_name: cg-cerbos
    ports:
      - "3593:3593"
    volumes:
      - ../../policies:/policies:ro
    command: ["server", "--set=storage.driver=disk", "--set=storage.disk.directory=/policies"]
    networks:
      - core-graph

  minio:
    image: minio/minio:latest
    container_name: cg-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cg_admin
      MINIO_ROOT_PASSWORD: cg_dev_only_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - core-graph

  prometheus:
    image: prom/prometheus:latest
    container_name: cg-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - core-graph

  grafana:
    image: grafana/grafana:latest
    container_name: cg-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: cg_dev_only
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - core-graph

volumes:
  pgdata:
  natsdata:
  valkeydata:
  miniodata:

networks:
  core-graph:
    driver: bridge
