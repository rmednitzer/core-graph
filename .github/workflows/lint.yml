name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  python-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  yaml-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - run: pip install yamllint
      - run: >
          yamllint
          -d '{extends: default, rules: {line-length: {max: 120}}}'
          policies/ artifact-index.yaml

  sql-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Validate SQL files are valid UTF-8 and end with a newline
        run: |
          set -euo pipefail
          failed=0
          for f in schema/migrations/*.sql schema/seed/*.sql; do
            [ -f "$f" ] || continue
            # UTF-8 check
            if ! iconv -f utf-8 -t utf-8 "$f" > /dev/null 2>&1; then
              echo "ERROR: $f is not valid UTF-8"
              failed=1
            fi
            # Trailing newline check
            if [ -n "$(tail -c1 "$f")" ]; then
              echo "ERROR: $f does not end with a newline"
              failed=1
            fi
          done
          exit $failed
      - name: Validate migration file naming (NNN_*.sql, sequential from 001)
        run: |
          set -euo pipefail
          expected=1
          for f in $(ls schema/migrations/*.sql 2>/dev/null | sort); do
            base=$(basename "$f")
            num=$(echo "$base" | grep -oP '^\d+')
            if [ -z "$num" ]; then
              echo "ERROR: $f does not start with a number"
              exit 1
            fi
            got=$((10#$num))
            if [ "$got" -ne "$expected" ]; then
              echo "ERROR: expected migration $(printf '%03d' $expected) but found $base"
              exit 1
            fi
            expected=$((expected + 1))
          done
          echo "Migration numbering OK ($(( expected - 1 )) file(s))"

  markdown-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          config: .markdownlint.yml
          globs: "**/*.md"

  helm-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
        with:
          version: v3.20.0
      - name: Helm lint (lab profile)
        run: helm lint deploy/k8s/helm
      - name: Helm lint (prod profile)
        run: helm lint deploy/k8s/helm -f deploy/k8s/helm/values.yaml -f deploy/k8s/helm/values-prod.yaml
      - name: Helm template (lab profile)
        run: helm template core-graph deploy/k8s/helm --debug > /dev/null
      - name: Helm template (prod profile)
        run: helm template core-graph deploy/k8s/helm -f deploy/k8s/helm/values.yaml -f deploy/k8s/helm/values-prod.yaml --debug > /dev/null

  kubeconform:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
        with:
          version: v3.20.0
      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/
      - name: Validate manifests (lab profile)
        run: |
          helm template core-graph deploy/k8s/helm | kubeconform \
            -strict \
            -summary \
            -kubernetes-version 1.32.0 \
            -skip CustomResourceDefinition
      - name: Validate manifests (prod profile)
        run: |
          helm template core-graph deploy/k8s/helm \
            -f deploy/k8s/helm/values.yaml \
            -f deploy/k8s/helm/values-prod.yaml | kubeconform \
            -strict \
            -summary \
            -kubernetes-version 1.32.0 \
            -skip CustomResourceDefinition

  zarf-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install check-jsonschema
      - name: Validate zarf.yaml against Zarf schema
        run: |
          check-jsonschema \
            --schemafile "https://raw.githubusercontent.com/zarf-dev/zarf/main/zarf.schema.json" \
            zarf.yaml
