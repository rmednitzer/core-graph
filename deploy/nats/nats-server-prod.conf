# Production NATS server configuration.
# NKey-based authentication with per-user permissions and TLS.

listen: 0.0.0.0:4222
http_port: 8222

# TLS configuration (cert paths set via deployment)
tls {
    cert_file: /etc/nats/tls/server.crt
    key_file: /etc/nats/tls/server.key
    ca_file: /etc/nats/tls/ca.crt
    verify: true
}

jetstream {
    store_dir: /data/jetstream
    max_mem: 1GB
    max_file: 10GB
    sync_interval: always
}

include accounts.conf
