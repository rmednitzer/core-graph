apiVersion: v1
kind: Secret
metadata:
  name: {{ include "core-graph.componentName" (dict "Release" .Release "Chart" .Chart "component" "api") }}-secret
  labels:
    {{- include "core-graph.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.postgres.enabled }}
  pg-password: {{ .Values.postgres.auth.password | quote }}
  {{- else }}
  pg-password: {{ required "postgres.external.password is required when postgres.enabled=false" .Values.postgres.external.password | quote }}
  {{- end }}
