apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: core-graph
  labels:
    app.kubernetes.io/name: valkey
    app.kubernetes.io/part-of: core-graph
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: valkey
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valkey
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:latest
          ports:
            - containerPort: 6379
              name: valkey
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: valkey-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: valkey-data
  namespace: core-graph
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: core-graph
spec:
  selector:
    app.kubernetes.io/name: valkey
  ports:
    - port: 6379
      targetPort: 6379
