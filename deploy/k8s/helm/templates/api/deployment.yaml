apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "core-graph.componentName" (dict "Release" .Release "Chart" .Chart "component" "api") }}
  labels:
    {{- include "core-graph.labels" . | nindent 4 }}
    {{- include "core-graph.selectorLabels" (dict "Release" .Release "component" "api") | nindent 4 }}
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "core-graph.selectorLabels" (dict "Release" .Release "component" "api") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/api/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/common/secrets.yaml") . | sha256sum }}
      {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "core-graph.selectorLabels" (dict "Release" .Release "component" "api") | nindent 8 }}
    spec:
      {{- include "core-graph.imagePullSecrets" . | nindent 6 }}
      initContainers:
        {{- include "core-graph.waitFor" (dict "name" "postgres" "host" (include "core-graph.postgresHost" .) "port" (include "core-graph.postgresPort" . | trimAll " ") "waitForImage" .Values.global.waitForImage) | nindent 8 }}
        {{- if .Values.nats.enabled }}
        {{- include "core-graph.waitFor" (dict "name" "nats" "host" (include "core-graph.componentName" (dict "Release" .Release "Chart" .Chart "component" "nats")) "port" "4222" "waitForImage" .Values.global.waitForImage) | nindent 8 }}
        {{- end }}
      containers:
        - name: api
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
              name: http
              protocol: TCP
          env:
            - name: CG_PG_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "core-graph.componentName" (dict "Release" .Release "Chart" .Chart "component" "api") }}-secret
                  key: pg-dsn
          envFrom:
            - configMapRef:
                name: {{ include "core-graph.componentName" (dict "Release" .Release "Chart" .Chart "component" "api") }}-config
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          securityContext:
            {{- include "core-graph.restrictedSecurityContext" (dict "runAsUser" 10001) | nindent 12 }}
      {{- include "core-graph.nodeScheduling" . | nindent 6 }}
      {{- include "core-graph.topologySpread" (dict "Values" .Values "Release" .Release "Chart" .Chart "component" "api" "replicaCount" .Values.api.replicaCount) | nindent 6 }}
