name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  schema-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: apache/age:release_PG16_1.6.0
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: core_graph_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: core_graph_test
    steps:
      - uses: actions/checkout@v4
      - name: Install extensions in service container
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client
          CONTAINER=$(docker ps -q --filter ancestor=apache/age:release_PG16_1.6.0)
          docker exec "$CONTAINER" bash -c \
            "apt-get update -qq && apt-get install -y postgresql-16-pgvector postgresql-16-pgaudit postgresql-16-cron"
          docker exec "$CONTAINER" bash -c \
            "echo \"shared_preload_libraries = 'age,pgaudit,pg_cron'\" >> /var/lib/postgresql/data/postgresql.conf"
          docker exec "$CONTAINER" bash -c \
            "echo \"cron.database_name = 'core_graph_test'\" >> /var/lib/postgresql/data/postgresql.conf"
          docker restart "$CONTAINER"
          until pg_isready -h localhost -p 5432 -U postgres; do sleep 1; done
      - name: Run migrations
        run: bash tests/schema/test_migrations.sh
      - name: Verify extensions exist
        run: |
          psql -c "SELECT extname FROM pg_extension WHERE extname IN ('age','vector','pgaudit','pg_cron') ORDER BY extname;" \
            | grep -E 'age|vector'

  rls-test:
    runs-on: ubuntu-latest
    needs: schema-test
    permissions:
      contents: read
    services:
      postgres:
        image: apache/age:release_PG16_1.6.0
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: core_graph_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: core_graph_test
    steps:
      - uses: actions/checkout@v4
      - name: Install extensions in service container
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client
          CONTAINER=$(docker ps -q --filter ancestor=apache/age:release_PG16_1.6.0)
          docker exec "$CONTAINER" bash -c \
            "apt-get update -qq && apt-get install -y postgresql-16-pgvector postgresql-16-pgaudit postgresql-16-cron"
          docker exec "$CONTAINER" bash -c \
            "echo \"shared_preload_libraries = 'age,pgaudit,pg_cron'\" >> /var/lib/postgresql/data/postgresql.conf"
          docker exec "$CONTAINER" bash -c \
            "echo \"cron.database_name = 'core_graph_test'\" >> /var/lib/postgresql/data/postgresql.conf"
          docker restart "$CONTAINER"
          until pg_isready -h localhost -p 5432 -U postgres; do sleep 1; done
      - name: Run migrations
        run: bash tests/schema/test_migrations.sh
      - name: Run RLS tests
        run: psql -f tests/rls/test_tlp_enforcement.sql

  policy-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Cerbos CLI
        run: |
          CERBOS_VERSION=$(curl -s https://api.github.com/repos/cerbos/cerbos/releases/latest \
            | grep -oP '"tag_name":\s*"\K[^"]+')
          curl -sL "https://github.com/cerbos/cerbos/releases/download/${CERBOS_VERSION}/cerbos_${CERBOS_VERSION#v}_Linux_x86_64.tar.gz" \
            | tar xz -C /usr/local/bin cerbos
          cerbos --version
      - name: Compile and test policies
        run: cerbos compile --tests=tests/auth policies/
