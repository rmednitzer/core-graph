{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "core-graph.componentName" (dict "Release" .Release "Chart" .Chart "component" "postgres") }}
  labels:
    {{- include "core-graph.labels" . | nindent 4 }}
    {{- include "core-graph.selectorLabels" (dict "Release" .Release "component" "postgres") | nindent 4 }}
spec:
  serviceName: {{ include "core-graph.componentName" (dict "Release" .Release "Chart" .Chart "component" "postgres") }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "core-graph.selectorLabels" (dict "Release" .Release "component" "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "core-graph.selectorLabels" (dict "Release" .Release "component" "postgres") | nindent 8 }}
    spec:
      {{- include "core-graph.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: postgres
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          ports:
            - containerPort: 5432
              name: postgres
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "core-graph.componentName" (dict "Release" .Release "Chart" .Chart "component" "postgres") }}-secret
                  key: password
          args:
            - "-c"
            - "shared_preload_libraries=age,pgaudit,pg_cron"
            - "-c"
            - "cron.database_name={{ .Values.postgres.auth.database }}"
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - pg_isready
                - "-U"
                - {{ .Values.postgres.auth.username | quote }}
                - "-d"
                - {{ .Values.postgres.auth.database | quote }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - "-U"
                - {{ .Values.postgres.auth.username | quote }}
                - "-d"
                - {{ .Values.postgres.auth.database | quote }}
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
      {{- include "core-graph.nodeScheduling" . | nindent 6 }}
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgres.storageClass }}
        storageClassName: {{ .Values.postgres.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
{{- end }}
