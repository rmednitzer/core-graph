# NATS account and user definitions for production.
# Each user has scoped publish/subscribe permissions.
#
# NKey pairs should be generated with `nk -gen user` and the public
# key placed here. Private keys stay with the respective service.

authorization {
    users = [
        # ingest_writer: satellite connectors publish events
        {
            user: ingest_writer
            password: $NATS_INGEST_WRITER_PASS
            permissions {
                publish {
                    allow = ["ingest.>"]
                }
                subscribe {
                    allow = ["dlq.>"]
                }
            }
        }

        # graph_consumer: graph writer subscribes to enriched entities
        {
            user: graph_consumer
            password: $NATS_GRAPH_CONSUMER_PASS
            permissions {
                publish {
                    allow = ["dlq.>"]
                }
                subscribe {
                    allow = ["enriched.>", "ingest.>"]
                }
            }
        }

        # api_service: REST/MCP API publishes events and reads responses
        {
            user: api_service
            password: $NATS_API_SERVICE_PASS
            permissions {
                publish {
                    allow = ["ingest.api.>"]
                }
                subscribe {
                    allow = ["_INBOX.>"]
                }
            }
        }

        # admin: full access for operations
        {
            user: admin
            password: $NATS_ADMIN_PASS
            permissions {
                publish = ">"
                subscribe = ">"
            }
        }
    ]
}
