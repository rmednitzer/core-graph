apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: core-graph
data:
  nats-server.conf: |
    listen: 0.0.0.0:4222
    http_port: 8222
    jetstream {
        store_dir: /data/jetstream
        max_mem: 256MB
        max_file: 1GB
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: core-graph
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: core-graph
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats
    spec:
      containers:
        - name: nats
          image: nats:latest
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitoring
          args: ["--config", "/etc/nats/nats-server.conf"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /etc/nats
            - name: jetstream
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: nats-config
        - name: jetstream
          persistentVolumeClaim:
            claimName: nats-jetstream
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nats-jetstream
  namespace: core-graph
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: core-graph
spec:
  selector:
    app.kubernetes.io/name: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitoring
      port: 8222
      targetPort: 8222
