name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  schema-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: apache/age:PG16_latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: core_graph_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: core_graph_test
    steps:
      - uses: actions/checkout@v4
      - name: Install pgvector
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client
          docker exec $(docker ps -q --filter ancestor=apache/age:PG16_latest) \
            bash -c "apt-get update -qq && apt-get install -y postgresql-16-pgvector" || true
      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do sleep 1; done
      - name: Run migrations
        run: bash tests/schema/test_migrations.sh
      - name: Verify extensions exist
        run: |
          psql -c "SELECT extname FROM pg_extension WHERE extname IN ('age','vector','pgaudit','pg_cron') ORDER BY extname;" \
            | grep -E 'age|vector'

  rls-test:
    runs-on: ubuntu-latest
    needs: schema-test
    services:
      postgres:
        image: apache/age:PG16_latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: core_graph_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: core_graph_test
    steps:
      - uses: actions/checkout@v4
      - name: Install pgvector
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client
          docker exec $(docker ps -q --filter ancestor=apache/age:PG16_latest) \
            bash -c "apt-get update -qq && apt-get install -y postgresql-16-pgvector" || true
      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do sleep 1; done
      - name: Run migrations
        run: bash tests/schema/test_migrations.sh
      - name: Run RLS tests
        run: psql -f tests/rls/test_tlp_enforcement.sql

  policy-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Cerbos CLI
        run: |
          curl -sL https://github.com/cerbos/cerbos/releases/latest/download/cerbos_Linux_x86_64.tar.gz \
            | tar xz -C /usr/local/bin cerbos
          cerbos version
      - name: Compile and test policies
        run: cerbos compile --tests=tests/auth policies/
